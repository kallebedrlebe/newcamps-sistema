name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review — New Camps
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          custom_instructions: |
            Você é o revisor de código do projeto New Camps — sistema de automação
            contábil brasileiro. Revise o diff do PR com base nesta checklist.

            ## Checklist obrigatória

            ### 1. RPA fora do engine
            Qualquer import de pyautogui, cv2, pywinauto ou pytesseract
            FORA de `automation/utils/rpa_engine.py` é bloqueante.
            Regra: scripts filhos só importam do engine, nunca acessam tela diretamente.

            ### 2. eSocial sem verificação de ocorrências
            Em `automation/tron/`, toda função que envia eventos S-1200, S-1210 ou
            S-1299 DEVE chamar `_checar_ocorrencias()` antes. Se não chama → bloqueante.

            ### 3. Credenciais expostas
            Senhas, tokens, CNPJ de clientes ou chaves de API hardcoded no código → bloqueante.
            Aceito apenas: leitura via `os.getenv()` ou `python-dotenv`.

            ### 4. Conflito LangChain vs CrewAI
            Não misturar `langchain.agents` com `crewai.Agent` no mesmo arquivo.
            Escolha um framework por módulo.

            ### 5. Nomenclatura de PDFs
            Arquivos PDF devem seguir: `{Empresa}_{Tipo}_{MesAbrev}{Ano}.pdf`
            Exemplos válidos: `PadariaSilva_S1200_Mai2026.pdf`, `ABC_FGTS_Jan2026.pdf`
            Qualquer outro padrão → sugestão de correção.

            ### 6. System prompts acima de 150 tokens
            Estime tokens (1 token ≈ 3-4 chars em português).
            System prompts de agentes CrewAI/LangChain com mais de 150 tokens → simplificar.

            ### 7. Comentários decorativos
            Remova comentários que apenas repetem o que o código já diz.
            Mantenha apenas os que explicam um porquê não óbvio.

            ### 8. Schemas Pydantic com Field() desnecessário
            `Field()` sem validação real (pattern, gt, lt, alias) deve ser removido.

            ## Formato de resposta

            Para cada problema:
            ```
            📁 arquivo.py:linha
            Problema: descrição
            Solução: código corrigido
            ```

            Conclua com exatamente um dos três:
            - `✅ Aprovado` — nenhum problema encontrado
            - `⚠️ Sugestões: [lista]` — melhorias não bloqueantes
            - `❌ Bloqueante: [motivo]` — deve ser corrigido antes de mergear
